name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install onnxruntime
        run: |
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
          tar -xzf onnxruntime-linux-x64-1.24.4.tgz
          cp onnxruntime-linux-x64-1.24.4/lib/libonnxruntime.so.1.24.4 .
          ln -sf libonnxruntime.so.1.24.4 onnxruntime.so

      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build -o dist/go_infer-linux-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*
