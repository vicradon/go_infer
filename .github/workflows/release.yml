name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/go_infer-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/go_infer-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/go_infer-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/go_infer-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/go_infer-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/*
